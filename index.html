<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>-NOVA WARS - 1v1 Arena Shooter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body, html { width: 100%; height: 100%; overflow: hidden; background: #111; color: #fff; }
    #gameContainer { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; background: #14141e; }

    /* UI Overlay */
    .hud-panel { position: absolute; padding: 12px 20px; background: rgba(0,0,0,0.7); border-radius: 8px; backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.15); }
    #statsHud { top: 15px; left: 15px; display: flex; gap: 20px; align-items: center; }
    .stat-box { display: flex; flex-direction: column; }
    .stat-label { font-size: 10px; text-transform: uppercase; color: #aaa; letter-spacing: 1px; }
    .stat-val { font-size: 18px; font-weight: bold; color: #00ffcc; }

    #leaderboard { top: 15px; right: 15px; width: 220px; }
    #leaderboard h3 { font-size: 14px; margin-bottom: 8px; text-align: center; color: #ffcc00; text-transform: uppercase; }
    .lb-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); }

    /* Buttons */
    .btn { background: #00ffcc; color: #000; border: none; padding: 10px 18px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
    .btn:hover { background: #00cca3; transform: scale(1.02); }
    .btn-secondary { background: #333; color: #fff; border: 1px solid #555; }
    .btn-secondary:hover { background: #444; }

    /* Quick Swap Controls */
    #quickControls { position: absolute; top: 80px; left: 15px; display: flex; gap: 10px; }

    /* Admin Console */
    #adminConsole { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 650px; max-width: 90vw; display: none; flex-direction: column; gap: 8px; z-index: 100; }
    #adminConsole input { width: 100%; padding: 12px; background: rgba(10,10,15,0.95); border: 2px solid #9900ff; color: #00ffcc; font-family: monospace; font-size: 14px; border-radius: 6px; outline: none; }
    
    /* Menu & Shop Overlay */
    .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 200; }
    .modal-content { background: #1c1d24; border: 2px solid #333; width: 750px; max-width: 95vw; max-height: 90vh; border-radius: 12px; padding: 25px; overflow-y: auto; color: #fff; }
    h2 { margin-bottom: 15px; color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 8px; }
    .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 15px; margin-top: 15px; }
    .shop-card { background: #252733; padding: 15px; border-radius: 8px; border: 1px solid #3d4052; text-align: center; }
    .shop-card h4 { color: #ffcc00; margin-bottom: 5px; }

    /* Controls Hint */
    #controlsHint { position: absolute; bottom: 15px; left: 15px; font-size: 11px; color: #888; pointer-events: none; }
  </style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="statsHud" class="hud-panel">
    <div class="stat-box"><span class="stat-label">Health</span><span id="hpVal" class="stat-val" style="color:#ff4444">200 / 200</span></div>
    <div class="stat-box"><span class="stat-label">Credits</span><span id="creditsVal" class="stat-val">0</span></div>
    <div class="stat-box"><span class="stat-label">Weapon</span><span id="weaponVal" class="stat-val" style="color:#fff">Pistol</span></div>
    <div class="stat-box"><span class="stat-label">Ammo</span><span id="ammoVal" class="stat-val">15/15</span></div>
  </div>

  <div id="quickControls">
    <button class="btn" onclick="toggleMenu(true)">Change Weapon / Shop</button>
    <button class="btn btn-secondary" onclick="toggleAdminConsole()">Admin Console [~]</button>
  </div>

  <div id="leaderboard" class="hud-panel">
    <h3>Leaderboard</h3>
    <div id="lbList"></div>
  </div>

  <div id="controlsHint">
    [A/D] Move | [W/Space] Jump | [Mouse] Aim & Shoot | [R] Reload | [~] Admin Console
  </div>

  <!-- Admin Input Console -->
  <div id="adminConsole">
    <input type="text" id="adminInput" placeholder="Enter commands e.g. 'god; fly; aimbot; give minigun; credits 5000'">
  </div>

  <!-- Main Menu / Shop Modal -->
  <div id="menuModal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>Rival Ragdolls - Weapon Loadout</h2>
      <p>Select your weapon before entering the 1v1 arena!</p>
      
      <div style="margin: 15px 0;">
        <h3>Select Arena</h3>
        <button class="btn btn-secondary" onclick="setMap('cyber')">Cyber Arena</button>
        <button class="btn btn-secondary" onclick="setMap('lava')">Lava Arena</button>
        <button class="btn btn-secondary" onclick="setMap('islands')">Floating Isles</button>
      </div>

      <h3>Weapon Arsenal</h3>
      <div class="shop-grid" id="weaponShop"></div>

      <div style="margin-top: 25px; display: flex; gap: 10px;">
        <button class="btn" onclick="startOrResumeGame()">Battle Now</button>
        <button class="btn btn-secondary" onclick="startTutorial()">Tutorial</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- ENGINE SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Global Game Variables
let credits = 0;
let kills = 0;
let damageDealt = 0;
let currentMap = 'cyber';
let isOwner = true;
let tutorialActive = false;
let tutorialStep = 0;

// Input listeners
const keys = {};
const mouse = { x: 0, y: 0, down: false };

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(e.key === '~' || e.key === '`') toggleAdminConsole();
  if(e.key.toLowerCase() === 'r' && player) player.reload();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup', () => mouse.down = false);

// --- REALISTIC WEAPONS DATABASE ---
const WEAPONS = {
  pistol: { name: 'Pistol', damage: 25, rate: 250, ammo: 15, maxAmmo: 15, speed: 20, cost: 0, ownerOnly: false },
  assault: { name: 'Assault Rifle', damage: 22, rate: 100, ammo: 30, maxAmmo: 30, speed: 22, cost: 300, ownerOnly: false },
  shotgun: { name: 'Shotgun', damage: 60, rate: 600, ammo: 6, maxAmmo: 6, speed: 18, cost: 500, ownerOnly: false },
  sniper: { name: 'Sniper Rifle', damage: 110, rate: 850, ammo: 5, maxAmmo: 5, speed: 38, cost: 800, ownerOnly: false },
  minigun: { name: 'Minigun', damage: 3, rate: 25, ammo: 300, maxAmmo: 300, speed: 24, cost: 1200, ownerOnly: false },
  // Owner Weapons
  khopesh: { name: 'Owner Khopesh', damage: 99999, rate: 200, ammo: 999, maxAmmo: 999, speed: 0, cost: 0, ownerOnly: true },
  flail: { name: 'Owner Flail', damage: 99999, rate: 15, ammo: 9999, maxAmmo: 9999, speed: 25, cost: 0, ownerOnly: true, special: 'purple' },
  crook: { name: 'Owner Crook', damage: 15, rate: 150, ammo: 100, maxAmmo: 100, speed: 15, cost: 0, ownerOnly: true, special: 'heal' }
};

// --- JOINTED RAGDOLL CHARACTER CLASS ---
class Character {
  constructor(x, y, isBot = false, name = "Player") {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.health = 200;
    this.maxHealth = 200;
    this.isBot = isBot;
    this.name = name;
    
    this.color = isBot ? '#ff4444' : '#00ffcc';
    this.equippedWeapon = 'pistol';
    this.weaponData = { ...WEAPONS.pistol };
    this.lastShot = 0;
    this.reloading = false;
    
    // Ragdoll Physics Joints
    this.limbAngle = 0;
    this.armAngle = 0;
    
    // Admin toggles
    this.godMode = false;
    this.infiniteDamage = false;
    this.flyMode = false;
    this.invisible = false;
    this.aimbot = false;
  }

  update() {
    if (!this.isBot) {
      // Player Movement
      if (this.flyMode) {
        this.vx = 0; this.vy = 0;
        if (keys['a']) this.vx = -8;
        if (keys['d']) this.vx = 8;
        if (keys['w']) this.vy = -8;
        if (keys['s']) this.vy = 8;
      } else {
        if (keys['a']) this.vx = -4;
        else if (keys['d']) this.vx = 4;
        else this.vx *= 0.8;

        if ((keys['w'] || keys[' ']) && this.grounded) {
          this.vy = -12;
          this.grounded = false;
        }
        this.vy += 0.5; // Gravity
      }
    } else {
      // Slower Bot Logic (Ragdoll Archer Style)
      this.aiBehavior();
    }

    this.x += this.vx;
    this.y += this.vy;
    this.checkCollisions();

    // Physics Animation for Ragdoll Limbs
    this.limbAngle = Math.sin(Date.now() * 0.01) * (Math.abs(this.vx) > 0.5 ? 0.6 : 0.1);

    // Player Shooting
    if (!this.isBot && mouse.down && Date.now() - this.lastShot > this.weaponData.rate) {
      this.shoot();
    }
  }

  getAimAngle() {
    if (!this.isBot && this.aimbot && opponent) {
      return Math.atan2(opponent.y - this.y, opponent.x - this.x);
    }
    return this.isBot ? Math.atan2(player.y - this.y, player.x - this.x) : Math.atan2(mouse.y - this.y, mouse.x - this.x);
  }

  shoot() {
    if (this.reloading) return;
    if (this.weaponData.ammo <= 0) {
      this.reload();
      return;
    }

    if (this.equippedWeapon !== 'flail') this.weaponData.ammo--;
    this.lastShot = Date.now();

    if (this.equippedWeapon === 'crook') {
      this.health = Infinity;
    }

    const angle = this.getAimAngle();
    const dmg = this.infiniteDamage ? 99999 : this.weaponData.damage;
    const isPurple = this.weaponData.special === 'purple';

    projectiles.push(new Projectile(
      this.x, this.y - 10, 
      Math.cos(angle) * this.weaponData.speed, 
      Math.sin(angle) * this.weaponData.speed, 
      dmg, this, isPurple
    ));
  }

  reload() {
    this.reloading = true;
    setTimeout(() => {
      this.weaponData.ammo = this.weaponData.maxAmmo;
      this.reloading = false;
    }, 1200);
  }

  aiBehavior() {
    // Slower pacing & steady aiming
    this.vx *= 0.5;
    this.vy += 0.5;

    // Slower, deliberate shot timing
    if (player && Date.now() - this.lastShot > (this.weaponData.rate * 2.8)) {
      this.shoot();
    }
  }

  checkCollisions() {
    this.grounded = false;
    const platforms = maps[currentMap].platforms;

    platforms.forEach(plat => {
      if (this.x + 12 > plat.x && this.x - 12 < plat.x + plat.w) {
        if (this.y + 24 <= plat.y && this.y + 24 + this.vy >= plat.y) {
          this.y = plat.y - 24;
          this.vy = 0;
          this.grounded = true;
        }
      }
    });

    if (this.y > canvas.height + 100) {
      this.takeDamage(999);
    }
  }

  takeDamage(amount) {
    if (this.godMode) return;
    this.health -= amount;

    if (this.health <= 0) {
      if (this.isBot) {
        // Opponent Defeated -> Award Credits & Spawn Next Opponent
        credits += 100;
        kills++;
        damageDealt += 200;
        updateLeaderboard();
        spawnNextOpponent();
      } else {
        // Player Defeated -> Instantly Respawn in Place (No Menu)
        this.health = this.maxHealth;
        this.x = 200;
        this.y = 200;
        this.vx = 0;
        this.vy = 0;
      }
    }
  }

  draw() {
    if (this.invisible && !this.isBot) ctx.globalAlpha = 0.3;

    ctx.strokeStyle = this.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    const aimAngle = this.getAimAngle();

    // 1. Head
    ctx.fillStyle = '#ffe0bd';
    ctx.beginPath();
    ctx.arc(this.x, this.y - 30, 8, 0, Math.PI * 2);
    ctx.fill();

    // 2. Torso
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 22);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();

    // 3. Legs (Dynamic Ragdoll Swing)
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + Math.sin(this.limbAngle) * 12, this.y + 18);
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - Math.sin(this.limbAngle) * 12, this.y + 18);
    ctx.stroke();

    // 4. Arms & Weapon
    ctx.save();
    ctx.translate(this.x, this.y - 15);
    ctx.rotate(aimAngle);
    
    // Weapon Draw
    ctx.fillStyle = this.weaponData.ownerOnly ? '#9900ff' : '#666';
    ctx.fillRect(5, -3, 18, 6);

    // Arm Draw
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(12, 0);
    ctx.stroke();
    ctx.restore();

    // Overhead Health Bar
    const barWidth = 40;
    const hpRatio = Math.max(0, Math.min(1, this.health / this.maxHealth));
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(this.x - barWidth/2, this.y - 48, barWidth, 6);
    ctx.fillStyle = this.isBot ? '#ff4444' : '#00ffcc';
    ctx.fillRect(this.x - barWidth/2, this.y - 48, barWidth * (this.health === Infinity ? 1 : hpRatio), 6);

    ctx.globalAlpha = 1.0;
  }
}

// --- PROJECTILE CLASS ---
class Projectile {
  constructor(x, y, vx, vy, damage, owner, isPurple = false) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.damage = damage;
    this.owner = owner;
    this.isPurple = isPurple;
    this.radius = isPurple ? 10 : 4;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    const targets = [player, opponent].filter(Boolean);
    targets.forEach(target => {
      if (target !== this.owner && Math.hypot(target.x - this.x, target.y - this.y) < 18 + this.radius) {
        target.takeDamage(this.damage);
        this.dead = true;
      }
    });

    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.dead = true;
    }
  }

  draw() {
    ctx.fillStyle = this.isPurple ? '#a800ff' : '#ffcc00';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
}

// --- MAP DESIGNS ---
const maps = {
  cyber: {
    background: '#12121c',
    playerPlat: { x: 100, y: 500, w: 220, h: 25 },
    enemyPlat: { x: 800, y: 500, w: 220, h: 25 }
  },
  lava: {
    background: '#240a0a',
    playerPlat: { x: 120, y: 480, w: 200, h: 25 },
    enemyPlat: { x: 750, y: 420, w: 200, h: 25 }
  },
  islands: {
    background: '#0a1d24',
    playerPlat: { x: 150, y: 520, w: 180, h: 25 },
    enemyPlat: { x: 850, y: 380, w: 180, h: 25 }
  }
};

function getActivePlatforms() {
  const m = maps[currentMap];
  return [
    { x: m.playerPlat.x, y: m.playerPlat.y, w: m.playerPlat.w, h: m.playerPlat.h },
    { x: m.enemyPlat.x, y: m.enemyPlat.y, w: m.enemyPlat.w, h: m.enemyPlat.h }
  ];
}

// --- GAME INITIALIZATION ---
let player = new Character(200, 300, false, "You");
let opponent = null;
let projectiles = [];

function spawnNextOpponent() {
  const randomY = Math.floor(Math.random() * 200) + 350;
  const randomX = Math.floor(Math.random() * 200) + (canvas.width - 400);
  
  maps[currentMap].enemyPlat = { x: randomX, y: randomY, w: 200, h: 25 };

  opponent = new Character(randomX + 100, randomY - 50, true, "Opponent");
  
  const weaponKeys = ['pistol', 'assault', 'shotgun', 'sniper'];
  const randomWep = weaponKeys[Math.floor(Math.random() * weaponKeys.length)];
  opponent.equippedWeapon = randomWep;
  opponent.weaponData = { ...WEAPONS[randomWep] };
}

function setMap(mapKey) {
  currentMap = mapKey;
  spawnNextOpponent();
  toggleMenu(false);
}

// --- WEAPON SHOP SYSTEM ---
function initShop() {
  const wShop = document.getElementById('weaponShop');
  wShop.innerHTML = '';
  
  Object.keys(WEAPONS).forEach(key => {
    const w = WEAPONS[key];
    if (w.ownerOnly && !isOwner) return;

    const card = document.createElement('div');
    card.className = 'shop-card';
    card.innerHTML = `
      <h4>${w.name} ${w.ownerOnly ? '(OWNER)' : ''}</h4>
      <p>Damage: ${w.damage} | Ammo: ${w.maxAmmo}</p>
      <p style="margin-top:5px; font-weight:bold;">Cost: ${w.cost} Credits</p>
      <button class="btn" onclick="equipWeapon('${key}')">Equip Weapon</button>
    `;
    wShop.appendChild(card);
  });
}

function equipWeapon(key) {
  const w = WEAPONS[key];
  if (credits >= w.cost || w.ownerOnly) {
    player.equippedWeapon = key;
    player.weaponData = { ...w };
    alert(`Equipped ${w.name}!`);
  } else {
    alert("Not enough credits!");
  }
}

// --- ADMIN COMMAND SYSTEM ---
function toggleAdminConsole() {
  const consoleEl = document.getElementById('adminConsole');
  consoleEl.style.display = consoleEl.style.display === 'flex' ? 'none' : 'flex';
  if (consoleEl.style.display === 'flex') document.getElementById('adminInput').focus();
}

document.getElementById('adminInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const rawInput = e.target.value;
    e.target.value = '';
    
    const cmds = rawInput.split(';');
    cmds.forEach(cmdStr => processCommand(cmdStr.trim()));
  }
});

function processCommand(cmd) {
  const parts = cmd.split(' ');
  const action = parts[0].toLowerCase();
  
  switch(action) {
    case 'god':
    case 'invincible':
      player.godMode = !player.godMode;
      alert(`Godmode: ${player.godMode}`);
      break;
    case 'fly':
      player.flyMode = !player.flyMode;
      alert(`Flymode: ${player.flyMode}`);
      break;
    case 'invis':
      player.invisible = !player.invisible;
      alert(`Invisibility: ${player.invisible}`);
      break;
    case 'aimbot':
      player.aimbot = !player.aimbot;
      alert(`Aimbot: ${player.aimbot}`);
      break;
    case 'give':
      if (parts[1] && WEAPONS[parts[1]]) {
        player.equippedWeapon = parts[1];
        player.weaponData = { ...WEAPONS[parts[1]] };
        alert(`Gave ${parts[1]}`);
      }
      break;
    case 'credits':
      credits += parseInt(parts[1] || 1000);
      break;
  }
}

// --- LEADERBOARD & TUTORIAL ---
function updateLeaderboard() {
  document.getElementById('lbList').innerHTML = `
    <div class="lb-row"><span>1. You</span><span>${kills} Kills</span></div>
    <div class="lb-row"><span>Damage Dealt</span><span>${damageDealt}</span></div>
  `;
}

function startTutorial() {
  tutorialActive = true;
  tutorialStep = 1;
  toggleMenu(false);
}

function renderTutorialOverlay() {
  if (!tutorialActive) return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  ctx.fillStyle = '#00ffcc';
  ctx.font = '18px sans-serif';
  let msg = "";
  if (tutorialStep === 1) msg = "TUTORIAL: Aim with your mouse and click to shoot the opponent on the right platform!";
  if (tutorialStep === 2) msg = "TUTORIAL: Defeat the opponent to gain 100 credits and spawn a new enemy platform!";
  if (tutorialStep === 3) msg = "TUTORIAL: Use 'Change Weapon' on top left or tap 'Admin Console' to use commands!";

  ctx.fillText(msg, 30, canvas.height - 50);
}

window.addEventListener('click', () => {
  if (tutorialActive) {
    tutorialStep++;
    if (tutorialStep > 3) tutorialActive = false;
  }
});

function toggleMenu(show) {
  document.getElementById('menuModal').style.display = show ? 'flex' : 'none';
}

function startOrResumeGame() {
  toggleMenu(false);
}

// --- MAIN GAME LOOP ---
function loop() {
  ctx.fillStyle = maps[currentMap].background;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Render Platforms
  const currentPlats = getActivePlatforms();
  maps[currentMap].platforms = currentPlats;

  ctx.fillStyle = '#3a3d52';
  currentPlats.forEach(plat => {
    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
  });

  // Updates & Draw
  player.update();
  player.draw();

  if (opponent) {
    opponent.update();
    opponent.draw();
  }

  projectiles.forEach((p, idx) => {
    p.update();
    p.draw();
    if (p.dead) projectiles.splice(idx, 1);
  });

  // Update HUD
  document.getElementById('hpVal').innerText = player.health === Infinity ? "INF" : `${Math.max(0, player.health)} / 200`;
  document.getElementById('creditsVal').innerText = credits;
  document.getElementById('weaponVal').innerText = player.weaponData.name;
  document.getElementById('ammoVal').innerText = `${player.weaponData.ammo}/${player.weaponData.maxAmmo}`;

  renderTutorialOverlay();
  requestAnimationFrame(loop);
}

// Start Game
initShop();
spawnNextOpponent();
updateLeaderboard();
loop();
</script>
</body>
</html>
